services:
  - type: web
    name: tuns-duty-app
    env: node
    nodeVersion: 22.13.0
    plan: free
    buildCommand: npm install -g pnpm && pnpm install && pnpm run build:web
    startCommand: npx serve web-build -c serve.json -l $PORT
    envVars:
      - key: EXPO_PUBLIC_FIREBASE_API_KEY
        sync: false
      - key: EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: EXPO_PUBLIC_FIREBASE_PROJECT_ID
        sync: false
      - key: EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: EXPO_PUBLIC_FIREBASE_APP_ID
        sync: false
